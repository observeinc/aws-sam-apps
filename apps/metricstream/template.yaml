---
AWSTemplateFormatVersion: '2010-09-09'
Description: 'Stream CloudWatch Metrics to S3.'
Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W1030
  AWS::ServerlessRepo::Application:
    Name: observe-metric-stream
    Description: Stream CloudWatch Metrics to S3.
    Author: Observe Inc
    SpdxLicenseId: Apache-2.0
    ReadmeUrl: README.md
    HomePageUrl: https://github.com/observeinc/aws-sam-apps
    SemanticVersion: '0.0.1'
    SourceCodeUrl: https://github.com/observeinc/aws-sam-apps

Parameters:
  BucketArn:
    Type: String
    Description: >-
      S3 Bucket ARN to write metrics.
    AllowedPattern: "^arn:.*$"
  Prefix:
    Type: String
    Description: >-
      Optional prefix to write metrics to.
    Default: ''
  FilterUri:
    Type: String
    Description: >-
      A file hosted in S3 containing list of metrics to stream.
    Default: 's3://observeinc/cloudwatchmetrics/filters/empty.yaml'
    AllowedPattern: '^(s3://.*)?$'
  OutputFormat:
    Type: String
    Description: >-
      The output format for CloudWatch Metrics.
    Default: 'json'
    AllowedValues:
      - json
      - opentelemetry0.7
      - opentelemetry1.0
  NameOverride:
    Type: String
    Description: >-
      Set Firehose Delivery Stream name. In the absence of a value, the stack
      name will be used.
    Default: ''
    MaxLength: 64
  BufferingInterval:
    Type: Number
    Default: 60
    MinValue: 60
    MaxValue: 900
    Description: |
      Buffer incoming data for the specified period of time, in seconds, before
      delivering it to the destination.
  BufferingSize:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 64
    Description: |
      Buffer incoming data to the specified size, in MiBs, before delivering it
      to the destination.
  ObserveAccountID:
    Type: String
    Description: Observe Account ID
    AllowedPattern: '\d*'
    Default: ''
  ObserveDomainName:
    Type: String
    Description: >-
      The domain name we will retrieve metric configuration from.
    Default: ''
  UpdateTimestamp:
    Type: String
    Description: Timestamp when the metric stream was created or updated.
    Default: ''
    AllowedPattern: '^[0-9]*$'
  DatasourceID:
    Type: String
    Description: >-
      The datasource for this metric stream. Providing this will override
      the MetricStreamFilterUri. The configuration from the datasource
      will be used instead.
    Default: ''
    AllowedPattern: '\d*'
  GQLToken:
    Type: String
    NoEcho: true
    Description: >-
      The token used to retrieve metric configuration.
    Default: ''
  LambdaS3BucketPrefix:
    Type: String
    Description: >-
      S3 bucket name prefix for the MetricsConfigurator Lambda code ZIP.
      The actual bucket is constructed as {prefix}-{region}, e.g.
      observeinc-us-west-2. Required for StackSet deployments.
    Default: ''
  LambdaS3Key:
    Type: String
    Description: >-
      S3 key for the MetricsConfigurator Lambda code ZIP.
    Default: ''
  MetricTagLambdaS3Key:
    Type: String
    Description: >-
      S3 key for the MetricTag Lambda code ZIP.
    Default: ''
  EnableMetricTag:
    Type: String
    Description: >-
      Enable the metrictag Lambda as a Firehose data transformation processor
      that enriches CloudWatch metric stream records with AWS resource tags.
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'false'
  MetricTagResourceCacheTTLSeconds:
    Type: Number
    Default: 600
    MinValue: 0
    Description: >-
      How long (in seconds) the metrictag Lambda caches tagged resource lists
      per namespace/region. Set to 0 to disable caching.
Conditions:
  UseStackName: !Equals
    - !Ref NameOverride
    - ''
  HasDatasourceID: !Not
    - !Equals
      - !Ref DatasourceID
      - ''
  EnableMetricTag: !Equals
    - !Ref EnableMetricTag
    - 'true'

Resources:
  DeliveryStreamRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - firehose.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      Policies:
        - PolicyName: logging
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt LogGroup.Arn
        - PolicyName: s3writer
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !Ref BucketArn
                  - !Sub '${BucketArn}/${Prefix}*'
        - !If
          - EnableMetricTag
          - PolicyName: lambda-transform
            PolicyDocument:
              Version: 2012-10-17
              Statement:
                - Effect: Allow
                  Action:
                    - lambda:InvokeFunction
                    - lambda:GetFunctionConfiguration
                  Resource: !Sub '${Metrictag.Arn}*'
          - !Ref AWS::NoValue
  LambdaLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Join
        - ''
        - - /aws/lambda/
          - !If
            - UseStackName
            - !Ref AWS::StackName
            - !Ref NameOverride
          - '-'
          - !Select [2, !Split ["/", !Ref "AWS::StackId"]]
          # This grabs the unique id part of the stack id.
          # This part is unique every time the stack is created.
          # the reason we have this is to avoid an error
          # if the stack is destroyed and created again.
          # If the log group name is the same on recreation,
          # an error will be thrown.
      RetentionInDays: 365
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
  LogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Join
        - ''
        - - /aws/firehose/
          - !If
            - UseStackName
            - !Ref AWS::StackName
            - !Ref NameOverride
      RetentionInDays: 365
  LogStream:
    Type: 'AWS::Logs::LogStream'
    Properties:
      LogStreamName: s3logs
      LogGroupName: !Ref LogGroup
  DeliveryStream:
    Type: 'AWS::KinesisFirehose::DeliveryStream'
    Properties:
      DeliveryStreamName: !If
        - UseStackName
        - !Ref AWS::StackName
        - !Ref NameOverride
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !Ref BucketArn
        RoleARN: !GetAtt DeliveryStreamRole.Arn
        # yamllint disable-line rule:line-length
        Prefix: !Sub '${Prefix}AWSLogs/${AWS::AccountId}/cloudwatchmetrics/${AWS::Region}/${OutputFormat}/'
        # yamllint disable-line rule:line-length
        ErrorOutputPrefix: !Sub '${Prefix}AWSLogs/${AWS::AccountId}/cloudwatchmetrics/${AWS::Region}/errors/'
        BufferingHints:
          IntervalInSeconds: !Ref BufferingInterval
          SizeInMBs: !Ref BufferingSize
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref LogGroup
          LogStreamName: !Ref LogStream
        ProcessingConfiguration: !If
          - EnableMetricTag
          - Enabled: true
            Processors:
              - Type: Lambda
                Parameters:
                  - ParameterName: LambdaArn
                    ParameterValue: !Sub '${Metrictag.Arn}:$LATEST'
                  - ParameterName: RoleArn
                    ParameterValue: !GetAtt DeliveryStreamRole.Arn
          - !Ref AWS::NoValue
  MetricStreamRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - streams.metrics.cloudwatch.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      Policies:
        - PolicyName: firehose
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - firehose:DescribeDeliveryStream
                  - firehose:ListDeliveryStreams
                  - firehose:ListTagsForDeliveryStream
                  - firehose:PutRecord
                  - firehose:PutRecordBatch
                Resource: !GetAtt 'DeliveryStream.Arn'
  MetricsConfiguratorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: MetricsConfiguratorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricStream
                  - cloudwatch:DeleteMetricStream
                  - cloudwatch:TagResource
                  - cloudwatch:ListTagsForResource
                Resource: !Sub |-
                  arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:*
              - Effect: Allow
                Action:
                  - cloudwatch:ListMetricStreams
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt MetricStreamRole.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt LambdaLogGroup.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: 'arn:aws:s3:::*'
        - !If
          - HasDatasourceID
          - PolicyName: SecretsManagerAccess
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - secretsmanager:GetSecretValue
                  Resource: !Ref GQLTokenSecret
          - !Ref AWS::NoValue
  MetricsConfigurator:
    Metadata:
      cfn-lint:
        config:
          ignore_checks:
            - W1031
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !If
        - UseStackName
        - !Ref AWS::StackName
        - !Ref NameOverride
      Role: !GetAtt MetricsConfiguratorRole.Arn
      Code:
        S3Bucket: !Sub '${LambdaS3BucketPrefix}-${AWS::Region}'
        S3Key: !Ref LambdaS3Key
      Handler: bootstrap
      Runtime: provided.al2023
      Timeout: 60
      Architectures:
        - arm64
      LoggingConfig:
        LogGroup: !Ref LambdaLogGroup
      Environment:
        Variables:
          VERBOSITY: 6
          FILTER_URI: !Ref FilterUri
          METRIC_STREAM_NAME: !If
            - UseStackName
            - !Ref AWS::StackName
            - !Ref NameOverride
          FIREHOSE_ARN: !GetAtt DeliveryStream.Arn
          ROLE_ARN: !GetAtt MetricStreamRole.Arn
          OUTPUT_FORMAT: !Ref OutputFormat
          ACCOUNT_ID: !Ref ObserveAccountID
          OBSERVE_DOMAIN_NAME: !Ref ObserveDomainName
          DATASOURCE_ID: !Ref DatasourceID
          SECRET_NAME: !If
            - HasDatasourceID
            - !Ref GQLTokenSecret
            - ''
  MetrictagLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Condition: EnableMetricTag
    Properties:
      LogGroupName: !If
        - UseStackName
        - !Sub '/aws/lambda/${AWS::StackName}-tag'
        - !Sub '/aws/lambda/${NameOverride}-tag'
      RetentionInDays: 365
  MetrictagRole:
    Type: AWS::IAM::Role
    Condition: EnableMetricTag
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logging
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt MetrictagLogGroup.Arn
        - PolicyName: tagging
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                # Follows YACE auth docs (see yet-another-cloudwatch-exporter
                # README #authentication) minus cloudwatch:* and
                # iam:ListAccountAliases which are not needed because this
                # Lambda enriches Firehose records and does not scrape
                # CloudWatch.
                Action:
                  - tag:GetResources
                  - autoscaling:DescribeAutoScalingGroups
                  - apigateway:GET
                  - ec2:DescribeSpotFleetRequests
                  - ec2:DescribeTransitGatewayAttachments
                  - dms:DescribeReplicationInstances
                  - dms:DescribeReplicationTasks
                  - aps:ListWorkspaces
                  - storagegateway:ListGateways
                  - storagegateway:ListTagsForResource
                  - shield:ListProtections
                Resource: '*'
  Metrictag:
    Metadata:
      cfn-lint:
        config:
          ignore_checks:
            - W1031
    Type: AWS::Lambda::Function
    Condition: EnableMetricTag
    Properties:
      FunctionName: !If
        - UseStackName
        - !Sub '${AWS::StackName}-tag'
        - !Sub '${NameOverride}-tag'
      Role: !GetAtt MetrictagRole.Arn
      Code:
        S3Bucket: !Sub '${LambdaS3BucketPrefix}-${AWS::Region}'
        S3Key: !Ref MetricTagLambdaS3Key
      Handler: bootstrap
      Runtime: provided.al2023
      Timeout: 60
      Architectures:
        - arm64
      LoggingConfig:
        LogGroup: !Ref MetrictagLogGroup
      Environment:
        Variables:
          RESOURCE_CACHE_TTL_SECONDS: !Ref MetricTagResourceCacheTTLSeconds
          VERBOSITY: '1'
  MetrictagFirehosePermission:
    Type: AWS::Lambda::Permission
    Condition: EnableMetricTag
    Properties:
      FunctionName: !GetAtt Metrictag.Arn
      Action: lambda:InvokeFunction
      Principal: firehose.amazonaws.com
      SourceArn: !GetAtt DeliveryStream.Arn
  GQLTokenSecret:
    Type: AWS::SecretsManager::Secret
    Condition: HasDatasourceID
    Properties:
      Description: GQL Token Secret
      Name: !Sub "observe-gql-token-${AWS::StackName}"
      SecretString: !Ref GQLToken
  StackCreationUpdateCustomResource:
    Type: Custom::StackCreationUpdateTrigger
    Properties:
      ServiceToken: !GetAtt MetricsConfigurator.Arn
      StackName: !Ref AWS::StackName
      UpdateTimestamp: !Ref UpdateTimestamp
      FilterUri: !Ref FilterUri
Outputs:
  MetricTagFunctionArn:
    Condition: EnableMetricTag
    Description: >-
      MetricTag Lambda ARN used as the Firehose data transformation processor.
    Value: !GetAtt Metrictag.Arn
  FirehoseArn:
    Description: >-
      Kinesis Firehose Delivery Stream ARN. CloudWatch Metric Streams
      subscribed to this Firehose will have their metrics batched and written
      to S3.
    Value: !GetAtt 'DeliveryStream.Arn'
  LogGroupName:
    Description: >-
      Firehose Log Group Name. This log group will contain debugging
      information if Firehose fails to deliver data to S3.
    Value: !Ref LogGroup
  MetricStreamNames:
    Description: >-
      Prefix of the CloudWatch metric stream names created by the
      MetricsConfigurator Lambda. Streams are named <prefix>0, <prefix>1, etc.
      (one stream per ~1000 metric names). Find them in the CloudWatch console
      under Metrics > Streams, or run:
      aws cloudwatch list-metric-streams
      --query "MetricStreams[?starts_with(Name, '<prefix>')].Name"
    Value: !Sub
      - '${Name}-metric-stream-'
      - Name: !If [UseStackName, !Ref 'AWS::StackName', !Ref NameOverride]
